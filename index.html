<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未掲載資格クイズ 第6弾｜20資格×50問</title>
  <meta name="description" content="未掲載資格20種類を収録した資格クイズサイト。各資格50問、ランダム50問出題、回答後自動で次の問題へ進みます。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <aside class="ad ad-left" aria-label="広告枠 左">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
      <!-- チェス -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8398161859137802"
           data-ad-slot="5599163841"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </aside>

    <main class="container">
      <header class="hero">
        <h1>未掲載資格クイズ 第6弾</h1>
        <p>20資格 × 50問。資格を選ぶとランダム50問が出題されます。</p>
      </header>

      <section id="homeArea" class="card">
        <h2>資格を選択</h2>
        <p class="lead">学習したい資格を選んでください。全資格ミックスも選べます。</p>
        <div class="toolbar">
          <button type="button" class="primary" data-exam="practice">全資格ミックスで開始</button>
        </div>
        <div id="examList" class="exam-list"></div>
      </section>

      <section id="quizArea" class="card hidden">
        <div class="quiz-top">
          <button type="button" id="homeBtn" class="ghost">🏠 ホームに戻る</button>
          <div class="progress-wrap">
            <div id="progressText">0/50問</div>
            <div class="progress" aria-label="進捗バー">
              <div id="progressBar"></div>
            </div>
          </div>
        </div>

        <p id="examLabel" class="label"></p>
        <h2 id="questionText"></h2>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback"></div>
      </section>

      <section id="resultArea" class="card hidden">
        <h2>結果</h2>
        <p id="resultText"></p>
        <div class="toolbar">
          <button type="button" id="retryBtn" class="primary">🔄 もう一度挑戦する</button>
          <button type="button" id="resultHomeBtn" class="ghost">🏠 ホームに戻る</button>
        </div>
      </section>
    </main>

    <aside class="ad ad-right" aria-label="広告枠 右">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
      <!-- チェス -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8398161859137802"
           data-ad-slot="5599163841"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </aside>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
